<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffb3c1;
            --bg: #fff0f3;
            --text: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            text-align: center;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            padding: 50px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 10px;
            animation: fadeIn 2s ease-in;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(255, 77, 109, 0.2);
            margin: 20px 0;
        }

        #typewriter {
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 100px;
        }

        .gift-section {
            margin-top: 40px;
        }

        .gift-box {
            font-size: 80px;
            cursor: pointer;
            transition: transform 0.3s;
            display: inline-block;
        }

        .gift-box:hover {
            transform: scale(1.2) rotate(5deg);
        }

        .hidden-note {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: var(--primary);
            margin-top: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .floating-heart {
            position: absolute;
            color: var(--secondary);
            font-size: 20px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="hearts" id="heartContainer"></div>

    <div class="container">
        <h1>Happy Birthday, [Her Name]!</h1>
        
        <div class="glass-card">
            <div id="typewriter"></div>
        </div>

        <div class="gift-section">
            <p>Click the gift to see your surprise:</p>
            <div class="gift-box" onclick="openGift()">🎁</div>
            <div id="note" class="hidden-note">I love you more than words can say! 💖</div>
        </div>
    </div>

    <script>
        // 1. Create floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.getElementById('heartContainer').appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);

        // 2. Typewriter Effect
        const text = "Every single day with you feels like a beautiful dream. You are my best friend, my soulmate, and my greatest adventure. Today is all about you! ✨";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        // 3. Gift Logic
        function openGift() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff4d6d', '#ffb3c1', '#ffffff']
            });
            document.getElementById('note').style.display = 'block';
            document.querySelector('.gift-box').innerHTML = '💝';
        }
    </script>
</body>
</html>
